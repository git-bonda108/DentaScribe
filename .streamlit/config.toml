# DentaScribe — dark clinical theme. Aligned with ui/theme.py CSS palette.
# Background ~ deep navy, surface ~ slate, mint-teal primary, off-white text.

[theme]
base                     = "dark"
primaryColor             = "#4DD4AC"
backgroundColor          = "#0B1220"
secondaryBackgroundColor = "#121A2B"
textColor                = "#E5E9F2"
font                     = "sans serif"

[server]
headless        = true
runOnSave       = true
fileWatcherType = "poll"

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
toolbarMode           = "minimal"
