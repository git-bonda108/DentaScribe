# DentaScribe — light clinical theme (Arini-inspired).
# Anchored at white surfaces with deep-navy text; teal accent used sparingly.

[theme]
base                     = "light"
primaryColor             = "#0EA5A4"
backgroundColor          = "#FFFFFF"
secondaryBackgroundColor = "#F8FAFB"
textColor                = "#0B1426"
font                     = "sans serif"

[server]
headless        = true
runOnSave       = true
fileWatcherType = "poll"

[browser]
gatherUsageStats = false

[client]
showSidebarNavigation = false
toolbarMode           = "minimal"
